# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for tests
spring.flyway.enabled=false

# Mock/Test Properties
stripe.webhook.secret=whsec_test_secret
cashfree.app.id=test_app_id
cashfree.secret.key=test_secret_key
cashfree.api.url=https://sandbox.cashfree.com/pg/orders
razorpay.api.secret=test_razorpay_secret
jwt.secret=test_jwt_secret_must_be_at_least_32_bytes_long_for_hs256_security
spring.mail.username=test@example.com
gemini.api.key=test_gemini_key
coingecko.api.key=test_coingecko_key
stripe.api.key=test_stripe_key
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000
