# Production Configuration
spring.config.activate.on-profile=prod

# Database (Production)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Security (JWT)
jwt.secret=${JWT_SECRET}

# Payment Providers (Production Keys)
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Cashfree (Production)
cashfree.app.id=${CASHFREE_APP_ID}
cashfree.secret.key=${CASHFREE_SECRET_KEY}
cashfree.api.url=https://api.cashfree.com/pg/links

# External APIs
coingecko.api.key=${COINGECKO_API_KEY}
coinmarketcap.api.key=${COINMARKETCAP_API_KEY}
gemini.api.key=${GEMINI_API_KEY}

# OAuth2 (Production)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://cryptello.com,https://www.cryptello.com}

# Monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
sentry.dsn=${SENTRY_DSN}
sentry.environment=prod

# Deployment Hardening
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.forward-headers-strategy=native
