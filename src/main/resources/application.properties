# Application Name
spring.application.name=Cryptello

# Default Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=5454

# Common Configuration
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=5MB

# Database Driver (Common)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always

# Database (Default/Local)
spring.datasource.url=jdbc:mysql://localhost:3306/cryptonex?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_db_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=cryptonex.in@gmail.com
spring.mail.password=your_email_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Payment Providers
# Stripe
stripe.api.key=your_stripe_api_key
stripe.webhook.secret=your_stripe_webhook_secret

# Razorpay
razorpay.api.key=your_razorpay_api_key
razorpay.api.secret=your_razorpay_api_secret

# Cashfree
cashfree.app.id=your_cashfree_app_id
cashfree.secret.key=your_cashfree_secret_key
cashfree.api.url=https://sandbox.cashfree.com/pg/links

# External APIs
coingecko.api.key=your_coingecko_api_key
coinmarketcap.api.key=your_coinmarketcap_api_key
gemini.api.key=your_gemini_api_key
# OAuth2
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
# Security (JWT)
jwt.secret=your_jwt_secret

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# App URLs
app.base-url=http://localhost:5454
app.frontend-url=http://localhost:5173

# DoS Protection Limits (Tomcat)
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.max-connections=8192
server.tomcat.accept-count=1000
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=15000
server.tomcat.max-keep-alive-requests=100

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Sentry (Error Tracking)
# DSN is empty by default (disabled). Set SENTRY_DSN env var to enable.
sentry.dsn=${SENTRY_DSN:}
# Environment tag (optional, good for filtering)
sentry.environment=${SENTRY_ENVIRONMENT:dev}

# Deployment Hardening
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
