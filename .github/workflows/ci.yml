name: Java CI with Maven

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cryptonex
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache SonarCloud packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Build with Maven
      run: mvn -B package --file pom.xml -DskipTests

    - name: Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      id: Dependency-Check
      with:
        project: 'CryptoVoid_Backend'
        path: '.'
        format: 'HTML'
        out: 'reports'
        # failOnCVSS: '7' # Optional: fail if high severity vulnerabilities found

    - name: Run Unit Tests
      run: mvn -B test
      env:
        DB_URL: jdbc:mysql://127.0.0.1:3306/cryptonex?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        DB_USER: root
        DB_PASSWORD: root
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        CASHFREE_APP_ID: ${{ secrets.CASHFREE_APP_ID }}
        CASHFREE_SECRET_KEY: ${{ secrets.CASHFREE_SECRET_KEY }}
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: target/surefire-reports
